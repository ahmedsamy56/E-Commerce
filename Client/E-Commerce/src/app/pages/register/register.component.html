<div class="auth-container d-flex align-items-center justify-content-center">
  <div class="auth-card p-4 p-md-5 bg-white shadow-lg border-0 rounded-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold">Create Account</h2>
      <p class="text-muted">Join our community and start shopping</p>
    </div>

    @if (errorMessage) {
    <div class="alert alert-danger border-0 shadow-sm rounded-3 mb-4" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
    </div>
    }

    @if (successMessage) {
    <div class="alert alert-success border-0 shadow-sm rounded-3 mb-4" role="alert">
      <i class="bi bi-check-circle-fill me-2"></i> {{ successMessage }}
    </div>
    }

    <form (ngSubmit)="onRegister()">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label fw-medium">Full Name</label>
          <input type="text" class="form-control rounded-3" placeholder="Ahmed Samy" name="name"
            [(ngModel)]="registerData.name" required [disabled]="isLoading">
        </div>
        <div class="col-12">
          <label class="form-label fw-medium">Email address</label>
          <input type="email" class="form-control rounded-3" placeholder="Ahmed@example.com" name="email"
            [(ngModel)]="registerData.email" required [disabled]="isLoading">
        </div>
        <div class="col-12">
          <label class="form-label fw-medium">Phone Number</label>
          <input type="tel" class="form-control rounded-3" placeholder="01205926527" name="phone"
            [(ngModel)]="registerData.phone" required [disabled]="isLoading">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Password</label>
          <input type="password" class="form-control rounded-3" placeholder="••••••••" name="password"
            [(ngModel)]="registerData.password" required [disabled]="isLoading">
        </div>
        <div class="col-md-6">
          <label class="form-label fw-medium">Confirm Password</label>
          <input type="password" class="form-control rounded-3" placeholder="••••••••" name="confirmPassword"
            [(ngModel)]="registerData.confirmPassword" required [disabled]="isLoading">
        </div>
      </div>

      <div class="form-check mt-1 mb-1">

      </div>

      <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold mb-4" [disabled]="isLoading">
        @if (isLoading) {
        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        }
        {{ isLoading ? 'Creating Account...' : 'Sign Up' }}
      </button>
    </form>

    <p class="text-center text-muted mb-0">
      Already have an account? <a routerLink="/login" class="text-primary text-decoration-none fw-bold">Sign In</a>
    </p>
  </div>
</div>
