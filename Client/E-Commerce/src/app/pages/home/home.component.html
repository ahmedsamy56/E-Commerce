<app-navbar></app-navbar>

<div class="container mt-5 mb-5">
    <div class="row mb-4 align-items-end">
        <div class="col-md-6">
            <h2 class="fw-bold">Our Products</h2>
        </div>
        <div class="col-md-6 text-md-end">
            <div class="category-filters d-flex flex-wrap gap-2 justify-content-md-end">
                <button 
                    class="btn btn-sm rounded-pill px-4 py-2" 
                    [class.btn-primary]="selectedCategoryId === null"
                    [class.btn-outline-primary]="selectedCategoryId !== null"
                    (click)="onCategorySelect(null)">
                    All
                </button>
                @for (category of categories; track category.id) {
                    <button 
                        class="btn btn-sm rounded-pill px-4 py-2" 
                        [class.btn-primary]="selectedCategoryId === category.id"
                        [class.btn-outline-primary]="selectedCategoryId !== category.id"
                        (click)="onCategorySelect(category.id)">
                        {{ category.name }}
                    </button>
                }
            </div>
        </div>
    </div>

    @if (errorMessage) {
        <div class="alert alert-danger border-0 shadow-sm rounded-3 mb-4" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ errorMessage }}
        </div>
    }

    @if (isLoading) {
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2 text-muted">Fetching products...</p>
        </div>
    } @else {
        <div class="row g-4">
            @for (product of products; track product.id) {
                <div class="col-12 col-md-6 col-lg-4 col-xl-3">
                    <app-product-card [product]="product"></app-product-card>
                </div>
            } @empty {
                <div class="col-12 text-center py-5">
                    <div class="display-1 text-muted mb-4"><i class="bi bi-archive"></i></div>
                    <h3>No products found</h3>
                    <p class="text-muted">Check back later for new arrivals.</p>
                </div>
            }
        </div>
    }
</div>
