<div class="admin-container d-flex">
    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-4 shadow-lg">
        <div class="d-flex align-items-center mb-5">
            <div class="logo-box bg-primary rounded-3 p-2 me-2">
                <i class="bi bi-shield-lock-fill text-white fs-4"></i>
            </div>
            <h5 class="mb-0 fw-bold tracking-tight">ADMIN PANEL</h5>
        </div>

        <nav class="nav flex-column gap-2">
            <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-link rounded-3 py-3 px-4 d-flex align-items-center">
                <i class="bi bi-grid-1x2-fill me-3"></i>
                Dashboard
            </a>
            <a routerLink="/admin/products" routerLinkActive="active" class="nav-link rounded-3 py-3 px-4 d-flex align-items-center">
                <i class="bi bi-box-seam-fill me-3"></i>
                Products
            </a>
            <a routerLink="/admin/categories" routerLinkActive="active" class="nav-link rounded-3 py-3 px-4 d-flex align-items-center">
                <i class="bi bi-tags-fill me-3"></i>
                Categories
            </a>
            <a routerLink="/admin/orders" routerLinkActive="active" class="nav-link rounded-3 py-3 px-4 d-flex align-items-center">
                <i class="bi bi-cart-check-fill me-3"></i>
                Orders
            </a>
        </nav>

        <div class="mt-auto pt-5">
            <div class="user-profile bg-secondary bg-opacity-10 rounded-4 p-3 mb-3 d-flex align-items-center">
                <div class="avatar bg-primary rounded-circle me-3 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                    {{ userName.charAt(0).toUpperCase() }}
                </div>
                <div class="overflow-hidden">
                    <p class="mb-0 fw-bold text-truncate">{{ userName }}</p>
                    <small class="text-truncate">Administrator</small>
                </div>
            </div>
            <button (click)="logout()" class="btn btn-outline-danger w-100 rounded-pill py-2">
                <i class="bi bi-box-arrow-left me-2"></i>
                Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content flex-grow-1 bg-light">
        <header class="bg-white border-bottom py-3 px-5 d-flex justify-content-between align-items-center sticky-top">
            <h5 class="mb-0 text-muted fw-medium">Welcome back, <span class="text-dark fw-bold">{{ userName }}</span></h5>
            <div class="d-flex align-items-center gap-3">
                <a routerLink="/home" class="btn btn-primary rounded-pill px-4 shadow-sm">
                    <i class="bi bi-shop me-2"></i>
                    Go to Shop
                </a>
            </div>
        </header>

        <div class="p-5">
            <router-outlet></router-outlet>
        </div>
    </div>
</div>
