<div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden product-card">
    <div class="position-relative cursor-pointer" [routerLink]="['/product-details', product.id]">
        <img [src]="product.imageUrl" class="card-img-top product-image" [alt]="product.name">
        <span class="badge bg-primary position-absolute top-0 end-0 m-3 rounded-pill px-3">
            ${{ product.price }}
        </span>
    </div>
    <div class="card-body p-4">
        <h5 class="card-title fw-bold text-truncate cursor-pointer" [routerLink]="['/product-details', product.id]">{{ product.name }}</h5>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <span class="text-secondary small">
                <i class="bi bi-box me-1"></i> Stock: {{ product.stock }}
            </span>
            <button class="btn btn-outline-primary btn-sm rounded-pill px-3" (click)="addToCart()">
                <i class="bi bi-cart-plus me-1"></i> Add
            </button>
        </div>
    </div>
</div>
