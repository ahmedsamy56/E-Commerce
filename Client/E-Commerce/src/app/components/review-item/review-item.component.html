<div class="card border-0 bg-light rounded-4 p-4 shadow-sm h-100">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div class="d-flex align-items-center">
            <div class="user-avatar bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3"
                style="width: 45px; height: 45px;">
                <i class="bi bi-person-fill fs-5"></i>
            </div>
            <div>
                <h6 class="mb-0 fw-bold">
                    User #{{ review.userId }}
                    @if(currentUserId == review.userId) {
                    <span class="badge bg-secondary ms-1">You</span>
                    }
                </h6>
                <div class="text-warning small mt-1">
                    @for (star of [1,2,3,4,5]; track star) {
                    <i class="bi" [class]="star <= review.rating ? 'bi-star-fill' : 'bi-star'"></i>
                    }
                </div>
            </div>
        </div>
        <div class="d-flex flex-column align-items-end gap-2">
            <span class="text-muted small">
                {{ formatDate(review.createdAt) }}
            </span>
            <div class="d-flex gap-2">
                @if (showProductLink) {
                    <a [routerLink]="['/product-details', review.productId]" 
                       class="btn btn-sm btn-outline-info rounded-circle border-0 bg-white shadow-sm" 
                       title="View Product">
                        <i class="bi bi-eye"></i>
                    </a>
                }
                @if (currentUserId == review.userId) {
                    <button class="btn btn-sm btn-outline-primary rounded-circle border-0 bg-white shadow-sm" 
                            title="Edit" (click)="onEdit()">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger rounded-circle border-0 bg-white shadow-sm" 
                            title="Delete" (click)="onDelete()">
                        <i class="bi bi-trash"></i>
                    </button>
                }
            </div>
        </div>
    </div>
    <p class="mb-0 text-dark-emphasis">
        "{{ review.comment }}"
    </p>
</div>
