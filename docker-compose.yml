services:

  # MySQL Database
  mysql:
    image: mysql:8.3
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ECommerceDB
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  #Backend 
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ahmedsamy56/ecommerce-backend:latest
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:mysql://mysql:3306/ECommerceDB?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      DB_USER: ecommerce_user
      DB_PASSWORD: ecommerce_pass
      REDIS_HOST: redis
      REDIS_PORT: 6379
    networks:
      - ecommerce-net
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

# Volumes
volumes:
  mysql_data:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge
